<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CityBus – Δημοτική Συγκοινωνία</title>
    <meta name="description" content="Επίλεξε γραμμή, δες τις στάσεις και μάθε πότε έρχεται το λεωφορείο." />

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="manifest.json" />

    <!-- ── Theme Color (Android status bar) ── -->
    <meta name="theme-color" content="#3b7ef6" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS / Safari PWA meta tags ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CityBus" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

    <!-- ── Fonts & Map ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:99999;padding:10px;font-size:12px;';
            errDiv.textContent = 'ERROR: ' + msg + ' at ' + line + ':' + col;
            document.body.appendChild(errDiv);
        };
    </script>
</head>

<body>
    <div id="app">
        <!-- ── MAP ── -->
        <div id="map"></div>



        <!-- ── BOTTOM SHEET ── -->
        <div id="sheet">
            <!-- Drag handle -->
            <div class="drag-zone" id="dragZone">
                <div class="drag-pill"></div>
            </div>

            <!-- Header -->
            <div class="sheet-header">
                <button class="back-btn hidden" id="backBtn" aria-label="Πίσω">‹</button>
                <div class="sheet-title-wrap">
                    <div class="sheet-title" id="sheetTitle">Επίλεξε Δήμο</div>
                    <div class="sheet-subtitle" id="sheetSub">Δημοτική Συγκοινωνία</div>
                </div>
                <button class="profile-btn" id="profileBtn" aria-label="Σύνδεση / Λογαριασμός" onclick="handleProfileBtnClick()">👤</button>
                <img src="logo.png" alt="CityBus Logo" class="logo-icon" />
            </div>

            <!-- Scrollable body -->
            <div class="sheet-body" id="sheetBody"></div>
        </div>

        <!-- Search Overlay -->
        <div class="search-overlay" id="searchOverlay">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Αναζήτηση γραμμής ή στάσης..." autocomplete="off" />
                <button class="search-close-btn" id="searchCloseBtn" aria-label="Κλείσιμο">×</button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-tab active" id="navArrivals" onclick="navTo('arrivals')">
                <span class="nav-icon">🚌</span>
                <span class="nav-label">Αφίξεις</span>
            </button>
            <button class="nav-tab" id="navFavorites" onclick="navTo('favorites')">
                <span class="nav-icon">❤️</span>
                <span class="nav-label">Αγαπημένα</span>
            </button>
            <button class="nav-tab" id="navSearch" onclick="navTo('search')">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Αναζήτηση</span>
            </button>
            <button class="nav-tab" id="navMap" onclick="navTo('map')">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label">Χάρτης</span>
            </button>
        </nav>
    </div>

    <!-- ── AUTH MODAL ── -->
    <div class="auth-modal" id="authModal" role="dialog" aria-modal="true" aria-label="Σύνδεση / Εγγραφή">
        <div class="auth-card">

            <!-- Close button -->
            <button class="auth-close-btn" id="authCloseBtn" onclick="closeAuthModal()" aria-label="Κλείσιμο">×</button>

            <!-- ── LOGIN PANEL ── -->
            <div class="auth-panel" id="panelLogin">
                <div class="auth-logo">🚌</div>
                <h2 class="auth-title">Καλώς ήρθες!</h2>
                <p class="auth-subtitle">Συνδέσου στον λογαριασμό σου</p>
                <form id="loginForm" onsubmit="doLogin(event)" novalidate>
                    <div class="auth-field">
                        <label class="auth-label" for="loginEmail">Email</label>
                        <input class="auth-input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="loginPassword">Κωδικός</label>
                        <input class="auth-input" id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" required />
                    </div>
                    <div class="auth-error" id="loginError"></div>
                    <button class="auth-btn" type="submit" id="loginSubmitBtn">Σύνδεση</button>
                </form>
                <div class="auth-links">
                    <button class="auth-link" onclick="showPanel('forgot')">Ξέχασες τον κωδικό;</button>
                    <span class="auth-separator">·</span>
                    <button class="auth-link" onclick="showPanel('register')">Δημιουργία λογαριασμού</button>
                </div>
            </div>

            <!-- ── REGISTER PANEL ── -->
            <div class="auth-panel hidden" id="panelRegister">
                <div class="auth-logo">✨</div>
                <h2 class="auth-title">Δημιουργία λογαριασμού</h2>
                <p class="auth-subtitle">Εγγραφή στο CityBus</p>
                <form id="registerForm" onsubmit="doRegister(event)" novalidate>
                    <div class="auth-field">
                        <label class="auth-label" for="regEmail">Email</label>
                        <input class="auth-input" id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="regPassword">Κωδικός</label>
                        <input class="auth-input" id="regPassword" type="password" placeholder="Τουλάχιστον 8 χαρακτήρες" autocomplete="new-password" required />
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="regConfirm">Επιβεβαίωση κωδικού</label>
                        <input class="auth-input" id="regConfirm" type="password" placeholder="••••••••" autocomplete="new-password" required />
                    </div>
                    <div class="auth-error" id="registerError"></div>
                    <button class="auth-btn" type="submit" id="registerSubmitBtn">Εγγραφή</button>
                </form>
                <div class="auth-links">
                    <button class="auth-link" onclick="showPanel('login')">Έχεις ήδη λογαριασμό; Σύνδεση</button>
                </div>
            </div>

            <!-- ── FORGOT PASSWORD PANEL ── -->
            <div class="auth-panel hidden" id="panelForgot">
                <div class="auth-logo">🔑</div>
                <h2 class="auth-title">Επαναφορά κωδικού</h2>
                <p class="auth-subtitle">Εισάγετε το email σας για να λάβετε σύνδεσμο επαναφοράς</p>
                <form id="forgotForm" onsubmit="doForgotPassword(event)" novalidate>
                    <div class="auth-field">
                        <label class="auth-label" for="forgotEmail">Email</label>
                        <input class="auth-input" id="forgotEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
                    </div>
                    <div class="auth-error" id="forgotError"></div>
                    <div class="auth-success" id="forgotSuccess"></div>
                    <button class="auth-btn" type="submit" id="forgotSubmitBtn">Αποστολή συνδέσμου</button>
                </form>
                <div class="auth-links">
                    <button class="auth-link" onclick="showPanel('login')">← Πίσω στη σύνδεση</button>
                </div>
            </div>

            <!-- ── RESET PASSWORD PANEL ── -->
            <div class="auth-panel hidden" id="panelReset">
                <div class="auth-logo">🔒</div>
                <h2 class="auth-title">Νέος κωδικός</h2>
                <p class="auth-subtitle">Ορισμός νέου κωδικού πρόσβασης</p>
                <form id="resetForm" onsubmit="doResetPassword(event)" novalidate>
                    <div class="auth-field">
                        <label class="auth-label" for="resetPassword">Νέος κωδικός</label>
                        <input class="auth-input" id="resetPassword" type="password" placeholder="Τουλάχιστον 8 χαρακτήρες" autocomplete="new-password" required />
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="resetConfirm">Επιβεβαίωση κωδικού</label>
                        <input class="auth-input" id="resetConfirm" type="password" placeholder="••••••••" autocomplete="new-password" required />
                    </div>
                    <div class="auth-error" id="resetError"></div>
                    <div class="auth-success" id="resetSuccess"></div>
                    <button class="auth-btn" type="submit" id="resetSubmitBtn">Αλλαγή κωδικού</button>
                </form>
            </div>

            <!-- ── PROFILE / LOGOUT PANEL ── -->
            <div class="auth-panel hidden" id="panelProfile">
                <div class="auth-avatar" id="profileAvatar"></div>
                <h2 class="auth-title" id="profileEmail"></h2>
                <p class="auth-subtitle">Συνδεδεμένος χρήστης</p>
                <button class="auth-btn auth-btn-outline" onclick="doLogout()">Αποσύνδεση</button>
            </div>

        </div>
    </div>

    <script src="app.js"></script>

    <!-- ── Service Worker Registration ── -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ CityBus SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>

</html>
