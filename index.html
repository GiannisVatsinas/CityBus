<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CityBus – Δημοτική Συγκοινωνία</title>
    <meta name="description" content="Επίλεξε γραμμή, δες τις στάσεις και μάθε πότε έρχεται το λεωφορείο." />

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="manifest.json" />

    <!-- ── Theme Color (Android status bar) ── -->
    <meta name="theme-color" content="#3b7ef6" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS / Safari PWA meta tags ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CityBus" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

    <!-- ── Fonts & Map ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <div id="app">
        <!-- ── MAP ── -->
        <div id="map"></div>

        <!-- ── Map legend ── -->
        <div class="map-fab" id="mapFab" style="display:none">
            <div class="fab-title" id="fabTitle">Γραμμές</div>
            <div id="fabItems"></div>
        </div>

        <!-- ── BOTTOM SHEET ── -->
        <div id="sheet">
            <!-- Drag handle -->
            <div class="drag-zone" id="dragZone">
                <div class="drag-pill"></div>
            </div>

            <!-- Header -->
            <div class="sheet-header">
                <button class="back-btn hidden" id="backBtn" aria-label="Πίσω">‹</button>
                <div class="sheet-title-wrap">
                    <div class="sheet-title" id="sheetTitle">Επίλεξε Δήμο</div>
                    <div class="sheet-subtitle" id="sheetSub">Δημοτική Συγκοινωνία</div>
                </div>
                <div class="logo-icon">🚌</div>
            </div>

            <!-- Scrollable body -->
            <div class="sheet-body" id="sheetBody"></div>
        </div>

        <!-- Search Overlay -->
        <div class="search-overlay" id="searchOverlay">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Αναζήτηση γραμμής ή στάσης..." autocomplete="off" />
                <button class="search-close-btn" id="searchCloseBtn" aria-label="Κλείσιμο">×</button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-tab active" id="navArrivals" onclick="navTo('arrivals')">
                <span class="nav-icon">🚌</span>
                <span class="nav-label">Αφίξεις</span>
            </button>
            <button class="nav-tab" id="navSearch" onclick="navTo('search')">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Αναζήτηση</span>
            </button>
            <button class="nav-tab" id="navMap" onclick="navTo('map')">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label">Χάρτης</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>

    <!-- ── Service Worker Registration ── -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ CityBus SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>

</html>
